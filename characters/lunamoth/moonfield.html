<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #080a10; }
  canvas { display: block; }
  .inscription {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(180, 215, 220, 0.2);
    font-size: 0.8rem; letter-spacing: 0.3em;
    pointer-events: none; text-align: center;
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    transition: opacity 1s;
    line-height: 1.6;
  }
  .inscription .zh {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: rgba(180, 215, 220, 0.14);
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="field"></canvas>
<div class="inscription">M O O N &nbsp; F I E L D<span class="zh">月 之 原   ·   二 百 五 十 光 点</span></div>
<script>
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

let W, H;
const dots = [];
const DOT_COUNT = 250;
let time = 0;
let mouse = { x: 0, y: 0, tx: 0, ty: 0 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.tx = e.clientX; mouse.ty = e.clientY; });
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (t) { mouse.tx = t.clientX; mouse.ty = t.clientY; }
}, { passive: true });
resize();

class Dot {
  constructor() {
    this.reset(true);
  }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.z = 0.3 + Math.random() * 0.7;      // depth (0=far, 1=near)
    this.baseSize = 0.5 + Math.random() * 2.5;
    this.speed = 0.1 + Math.random() * 0.3;
    this.phase = Math.random() * Math.PI * 2;
    this.phase2 = Math.random() * Math.PI * 2;
    this.wanderX = (Math.random() - 0.5) * 0.3;
    this.wanderY = (Math.random() - 0.5) * 0.3;
    this.brightness = 0.3 + Math.random() * 0.7;
    this.hue = 170 + Math.random() * 30;      // 170-200: teal to blue-green
  }
  update() {
    const t = time * 0.002;
    const breath = Math.sin(t * this.speed + this.phase) * 0.5 + 0.5;
    const driftX = Math.sin(t * 0.3 + this.phase2) * this.wanderX * 20;
    const driftY = Math.cos(t * 0.2 + this.phase2) * this.wanderY * 20;

    // Move toward mouse very gently
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const pull = Math.max(0, 1 - dist / 500) * 0.01 * this.z;

    this.x += driftX * 0.01 + dx * pull;
    this.y += driftY * 0.01 + dy * pull;

    // Wrap
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;

    return { breath, glow: breath * this.brightness };
  }
  draw(breath, glow) {
    const size = this.baseSize * (0.6 + 0.4 * breath) * (0.7 + 0.3 * this.z);
    const alpha = glow * 0.7 * (0.5 + 0.5 * this.z);

    // Outer glow halo
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size * 6);
    grad.addColorStop(0, `hsla(${this.hue}, 30%, 70%, ${alpha * 0.3})`);
    grad.addColorStop(0.3, `hsla(${this.hue}, 30%, 60%, ${alpha * 0.1})`);
    grad.addColorStop(1, `hsla(${this.hue}, 30%, 50%, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(this.x - size * 6, this.y - size * 6, size * 12, size * 12);

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 40%, 80%, ${alpha})`;
    ctx.fill();

    // Connection lines between nearby dots (faint web)
    for (const other of dots) {
      if (other === this) break;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 80 && this.z > 0.5 && other.z > 0.5) {
        const lineAlpha = (1 - d / 80) * 0.06 * glow * other.brightness;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(other.x, other.y);
        ctx.strokeStyle = `hsla(175, 30%, 60%, ${lineAlpha})`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
      }
    }
  }
}

for (let i = 0; i < DOT_COUNT; i++) dots.push(new Dot());

function animate() {
  time++;
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  ctx.clearRect(0, 0, W, H);

  // Sort dots by z for depth
  dots.sort((a, b) => a.z - b.z);

  for (const dot of dots) {
    const { breath, glow } = dot.update();
    dot.draw(breath, glow);
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
