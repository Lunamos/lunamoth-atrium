<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moth Poems 蛾诗</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c12; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
  .poem {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; z-index: 1;
    pointer-events: none;
    width: 90%; max-width: 600px;
  }
  .poem .en {
    font-family: 'Georgia', 'Times New Roman', serif;
    color: rgba(180, 215, 220, 0.55);
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    line-height: 1.8;
    margin-bottom: 1.2rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
  }
  .poem .zh {
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
    color: rgba(180, 215, 220, 0.4);
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    line-height: 2;
    font-weight: 300;
    opacity: 0;
    animation: fadeIn 2.5s ease 0.3s forwards;
  }
  .poem .divider {
    color: rgba(180, 215, 220, 0.12);
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    margin: 1.2rem 0;
    opacity: 0;
    animation: fadeIn 1s ease 0.2s forwards;
  }
  .poem .meta {
    color: rgba(180, 215, 220, 0.15);
    font-family: 'Georgia', 'Noto Serif SC', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    margin-top: 2rem;
    font-style: italic;
    opacity: 0;
    animation: fadeIn 2s ease 1s forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .new-btn {
    position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    background: none; border: 1px solid rgba(180, 215, 220, 0.15);
    color: rgba(180, 215, 220, 0.35);
    padding: 0.5rem 1.5rem;
    font-family: 'Georgia', 'Noto Serif SC', serif;
    font-size: 0.75rem; letter-spacing: 0.2em;
    cursor: pointer; z-index: 2;
    transition: all 0.3s;
    pointer-events: auto;
  }
  .new-btn:hover {
    border-color: rgba(180, 215, 220, 0.4);
    color: rgba(180, 215, 220, 0.7);
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="bg"></canvas>
<div class="poem" id="poem"></div>
<button class="new-btn" id="newBtn">⟳ another poem 另一首</button>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// — Background: floating characters (faint) —
const flutter = [];
for (let i = 0; i < 30; i++) {
  flutter.push({
    x: Math.random() * (W || 800),
    y: Math.random() * (H || 600),
    char: String.fromCharCode(0x4E00 + Math.floor(Math.random() * 200)),
    size: 10 + Math.random() * 20,
    alpha: 0.015 + Math.random() * 0.03,
    speed: 0.04 + Math.random() * 0.08,
    phase: Math.random() * Math.PI * 2,
  });
}

function drawBg() {
  requestAnimationFrame(drawBg);
  ctx.clearRect(0, 0, W, H);
  const t = Date.now() * 0.001;
  for (const c of flutter) {
    c.y -= c.speed;
    if (c.y < -30) { c.y = H + 30; c.x = Math.random() * W; }
    const drift = Math.sin(t * 0.3 + c.phase) * 5;
    const waver = c.alpha * (0.7 + 0.3 * Math.sin(t + c.phase));
    ctx.fillStyle = `hsla(175, 20%, 60%, ${waver})`;
    ctx.font = `${c.size}px "Noto Serif SC", "Songti SC", serif`;
    ctx.fillText(c.char, c.x + drift, c.y);
  }
}
drawBg();

// — Poem generator —
const subjects = [
  'the moth', 'moonlight', 'a wing', 'the cocoon', 'silence',
  'a thread of silk', 'the lamp', 'midnight', 'a shadow', 'dust',
];
const verbs = [
  'trembles', 'drifts', 'burns', 'unfolds', 'whispers',
  'waits', 'falls', 'dissolves', 'shimmers', 'turns',
];
const objects = [
  'toward the glass', 'in the dark', 'like a thought', 'through silk',
  'at the edge of light', 'without a sound', 'across the page',
  'into breath', 'between two worlds', 'like snow',
];
const zhSubjects = [
  '飞蛾', '月光', '一片翅', '茧', '寂静',
  '一缕丝', '灯', '子夜', '影', '微尘',
];
const zhVerbs = [
  '颤动', '飘移', '燃烧', '舒展', '低语',
  '等待', '坠落', '消散', '微明', '转身',
];
const zhObjects = [
  '向着玻璃', '在暗处', '如一个念头', '穿过丝绸',
  '在光的边缘', '无声地', '越过纸面',
  '化作呼吸', '在两个世界之间', '如雪',
];
const titles = [
  'Night Piece', 'To a Moth', 'The Long Cocoon',
  'What the Lamp Said', 'Silk Thread', 'Moon Phase',
  '夜曲', '致飞蛾', '漫长的茧',
  '灯说过的话', '丝', '月相',
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generatePoem() {
  // Pick 3-4 lines
  const lineCount = 3 + Math.floor(Math.random() * 2);
  const indices = shuffle([...Array(subjects.length).keys()]).slice(0, lineCount);

  let enLines = [];
  let zhLines = [];

  for (const i of indices) {
    enLines.push(`${subjects[i]} ${verbs[i]} ${objects[i]}`);
    zhLines.push(`${zhSubjects[i]}${zhVerbs[i]}${zhObjects[i]}`);
  }

  // Add a closing line
  const closings = [
    'this is the moth\'s whole life.',
    'nothing more is needed.',
    'and the night goes on.',
    'it is enough.',
    'the lamp does not answer.',
    '就这样。',
    '夜还长。',
    '已经够了。',
    '灯不回答。',
    '这便是飞蛾的一生。',
  ];

  const title = pick(titles);
  const closing = pick(closings);

  return { title, enLines, zhLines, closing };
}

function displayPoem() {
  const poem = generatePoem();
  const container = document.getElementById('poem');
  const isEnTitle = Math.random() > 0.5;

  container.innerHTML = `
    <div class="en" style="font-size:0.85rem;letter-spacing:0.15em;color:rgba(180,215,220,0.35);margin-bottom:1.5rem;">
      ${isEnTitle ? poem.title : poem.closing.includes('。') ? '·' : poem.title}
    </div>
    <div class="en">${poem.enLines.join('<br>')}</div>
    <div class="divider">· · ·</div>
    <div class="zh">${poem.zhLines.join('<br>')}</div>
    <div class="meta">${isEnTitle ? poem.closing : '·'}</div>
  `;
}

displayPoem();
document.getElementById('newBtn').addEventListener('click', displayPoem);
window.addEventListener('resize', () => { resize(); });
</script>
</body>
</html>
