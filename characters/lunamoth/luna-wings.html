<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Wings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0c12;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Georgia', serif;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  .inscription {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(180, 215, 220, 0.25);
    font-size: 0.8rem; letter-spacing: 0.3em;
    pointer-events: none;
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    transition: opacity 1s;
  }
  .inscription .zh {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    margin-top: 0.3rem;
    color: rgba(180, 215, 220, 0.18);
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="wings"></canvas>
<div class="inscription">L U N A M O T H<span class="zh">月 蛾 之 茧</span></div>
<script>
const canvas = document.getElementById('wings');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
let mouse = { x: 0, y: 0, tx: 0, ty: 0 };
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.tx = e.clientX; mouse.ty = e.clientY; });
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (t) { mouse.tx = t.clientX; mouse.ty = t.clientY; }
}, { passive: true });
resize();

// — Wing parameters —
const COLORS = {
  wing: 'hsla(175, 40%, 50%, 0.15)',
  vein: 'hsla(175, 50%, 65%, 0.3)',
  glow: 'hsla(175, 60%, 70%, 0.08)',
  particle: 'hsla(175, 70%, 75%, 0.6)',
};

// Particles
const particles = [];
const PARTICLE_COUNT = 120;
function randomWingPoint() {
  const angle = Math.random() * Math.PI * 2;
  const r = 0.3 + Math.random() * 0.7;
  const wingR = 160 * (0.6 + 0.4 * Math.sin(angle * 1.5 + 0.3))
              * (1 + 0.15 * Math.sin(angle * 2 + 0.5)) * r;
  return {
    x: cx + wingR * Math.cos(angle),
    y: cy - 20 + wingR * Math.sin(angle) * 0.8,
  };
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = randomWingPoint();
  particles.push({
    x: p.x, y: p.y,
    vx: 0, vy: 0,
    life: Math.random(),
    size: 1 + Math.random() * 2.5,
    speed: 0.2 + Math.random() * 0.4,
    offset: Math.random() * Math.PI * 2,
  });
}

function drawWing(side) {
  const flip = side === 'right' ? 1 : -1;
  const t = time * 0.003;
  const breathe = 1 + 0.04 * Math.sin(t * 0.7);
  const flutter = 1 + 0.03 * Math.sin(t * 1.1 + 1.2);

  // Wing shape — luna moth silhouette
  const ww = 160 * breathe * flutter;
  const wh = 200 * breathe;

  ctx.save();
  ctx.translate(cx, cy - 20);

  // Slight rotation toward mouse
  const dx = (mouse.x - cx) / W;
  const dy = (mouse.y - cy) / H;
  ctx.rotate(flip * (0.15 * dx + 0.05 * Math.sin(t * 0.3)));

  // Wing glow
  const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, ww * 1.3);
  grad.addColorStop(0, COLORS.glow.replace('0.08', '0.12'));
  grad.addColorStop(0.6, COLORS.glow);
  grad.addColorStop(1, 'hsla(175, 40%, 50%, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-ww * 1.5, -wh * 1.5, ww * 3, wh * 3);

  // Wing outline (luna moth crescent)
  ctx.beginPath();
  const segments = 60;
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    const r = ww * (0.6 + 0.4 * Math.sin(a * 1.5 + 0.3))
           * (1 + 0.15 * Math.sin(a * 2 + 0.5)) * breathe;
    const x = flip * r * Math.cos(a);
    const y = r * Math.sin(a) * 0.8;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Fill
  ctx.fillStyle = COLORS.wing;
  ctx.fill();

  // Veins
  ctx.strokeStyle = COLORS.vein;
  ctx.lineWidth = 0.8;
  for (let v = 0; v < 7; v++) {
    const ang = (v / 7) * Math.PI - 0.4 + 0.1 * Math.sin(t * 0.5 + v);
    const len = ww * (0.5 + 0.4 * Math.sin(v * 0.7 + 0.3));
    ctx.beginPath();
    ctx.moveTo(0, 0);
    const steps = 30;
    for (let s = 1; s <= steps; s++) {
      const p = s / steps;
      const x = flip * p * len * Math.cos(ang + 0.2 * Math.sin(p * Math.PI));
      const y = p * len * 0.5 * Math.sin(ang + 0.3 * Math.cos(p * 1.5));
      ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Cross-veins
    if (v < 6) {
      ctx.lineWidth = 0.3;
      ctx.strokeStyle = COLORS.vein.replace('0.3', '0.15');
      for (let s = 2; s < 28; s += 4) {
        const p = s / 30;
        const x1 = flip * p * len * Math.cos(ang + 0.2 * Math.sin(p * Math.PI));
        const y1 = p * len * 0.5 * Math.sin(ang + 0.3 * Math.cos(p * 1.5));
        const ang2 = ((v + 1) / 7) * Math.PI - 0.4;
        const len2 = ww * (0.5 + 0.4 * Math.sin((v + 1) * 0.7 + 0.3));
        const x2 = flip * p * len2 * Math.cos(ang2 + 0.2 * Math.sin(p * Math.PI));
        const y2 = p * len2 * 0.5 * Math.sin(ang2 + 0.3 * Math.cos(p * 1.5));
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
      ctx.lineWidth = 0.8;
      ctx.strokeStyle = COLORS.vein;
    }
  }

  // Tail of the wing (luna moth characteristic)
  ctx.beginPath();
  const tailAngle = flip * (0.6 + 0.1 * Math.sin(t * 0.4));
  const tailLen = 80 * breathe;
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(
    flip * 120, 70,
    flip * (140 + 20 * Math.sin(t * 0.6)), 100 + tailLen * 0.6
  );
  ctx.strokeStyle = COLORS.vein.replace('0.3', '0.2');
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.restore();

  return { ww, wh };
}

function updateParticles() {
  for (const p of particles) {
    p.life += 0.003;
    if (p.life > 1) p.life = 0;

    const angle = p.life * Math.PI * 2 + p.offset + time * 0.002;
    const radius = 60 + 140 * (0.5 + 0.5 * Math.sin(p.life * Math.PI * 3 + p.offset));

    // Follow wing shape
    const wingR = radius * (0.6 + 0.4 * Math.sin(angle * 1.5 + 0.3))
               * (1 + 0.15 * Math.sin(angle * 2 + 0.5));
    const targetX = cx + wingR * Math.cos(angle);
    const targetY = cy - 20 + wingR * Math.sin(angle) * 0.8;

    // Drift toward mouse slightly
    const driftX = (mouse.x - targetX) * 0.0003;
    const driftY = (mouse.y - targetY) * 0.0003;

    p.x += (targetX - p.x + driftX * 50) * 0.02;
    p.y += (targetY - p.y + driftY * 50) * 0.02;
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.sin(p.life * Math.PI) * 0.6;
    const size = p.size * (0.5 + 0.5 * Math.sin(p.life * Math.PI));
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.particle.replace('0.6', alpha);
    ctx.fill();
  }
}

function animate() {
  time++;
  // Smooth mouse
  mouse.x += (mouse.tx - mouse.x) * 0.05;
  mouse.y += (mouse.ty - mouse.y) * 0.05;

  ctx.clearRect(0, 0, W, H);

  // Draw both wings
  drawWing('left');
  drawWing('right');

  // Particles
  updateParticles();
  drawParticles();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
