<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Garden 沙庭</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1210; }
  canvas { display: block; }
  .inscription {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(180, 200, 190, 0.18);
    font-size: 0.8rem; letter-spacing: 0.3em;
    pointer-events: none; text-align: center;
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    line-height: 1.6;
    white-space: nowrap;
  }
  .inscription .zh {
    display: block;
    font-size: 0.65rem; letter-spacing: 0.5em;
    color: rgba(180, 200, 190, 0.12);
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="sand"></canvas>
<div class="inscription">S A N D &nbsp; G A R D E N &nbsp; · &nbsp; 沙 庭<span class="zh">鼠标移动 · 沙纹随之改变</span></div>
<script>
const canvas = document.getElementById('sand');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let mouse = { x: 0, y: 0, tx: 0, ty: 0, px: 0, py: 0 };
let drawnRings = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.px = mouse.tx; mouse.py = mouse.ty;
  mouse.tx = e.clientX; mouse.ty = e.clientY;
});
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (t) { mouse.px = mouse.tx; mouse.py = mouse.ty; mouse.tx = t.clientX; mouse.ty = t.clientY; }
}, { passive: true });
resize();

// — Sand particles (the "grains") —
const grains = [];
const GRAIN_COUNT = 3000;
for (let i = 0; i < GRAIN_COUNT; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 0.95;
  grains.push({
    angle,
    dist,
    // Raked position (will be updated by rake lines)
    rx: 0, ry: 0,
    // Original random offset for texture
    ox: (Math.random() - 0.5) * 2,
    oy: (Math.random() - 0.5) * 2,
    size: 0.3 + Math.random() * 0.5,
    shade: 0.2 + Math.random() * 0.3,
  });
}

// — Stones (decorative rocks in the garden) —
const stones = [];
const STONE_COUNT = 5;
for (let i = 0; i < STONE_COUNT; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 0.1 + Math.random() * 0.7;
  stones.push({
    x: Math.cos(angle) * dist,
    y: Math.sin(angle) * dist,
    radius: 0.03 + Math.random() * 0.06,
    hue: 40 + Math.random() * 30,
    rotation: Math.random() * Math.PI * 2,
    irregularity: 0.1 + Math.random() * 0.2,
  });
}

// — Rake pattern: concentric rings disturbed by stones and mouse —
function computeRake(x, y) {
  // Returns a "rake height" value for a given position
  // Rings
  const dist = Math.sqrt(x * x + y * y);
  const ringPhase = Math.sin(dist * 30 - time * 0.005) * 0.5 + 0.5;
  const rings = Math.sin(dist * 40 + time * 0.002) * ringPhase * 0.3;

  // Stones: create radial disturbance
  let stoneDisturb = 0;
  for (const stone of stones) {
    const dx = x - stone.x;
    const dy = y - stone.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < stone.radius * 2.5) {
      stoneDisturb += Math.sin(d * 15) * (1 - d / (stone.radius * 2.5)) * 0.2;
    }
  }

  // Mouse disturbance
  const mx = (mouse.x - cx) / Math.min(W, H) * 2;
  const my = (mouse.y - cy) / Math.min(W, H) * 2;
  const mdx = x - mx;
  const mdy = y - my;
  const md = Math.sqrt(mdx * mdx + mdy * mdy);
  let mouseDisturb = 0;
  if (md < 0.3) {
    mouseDisturb = Math.sin(md * 20 + time * 0.01) * (1 - md / 0.3) * 0.15;
  }

  // Wave ripple from mouse movement
  const speed = Math.sqrt((mouse.tx - mouse.px) ** 2 + (mouse.ty - mouse.py) ** 2);
  const wave = Math.sin(md * 25 - time * 0.03) * Math.min(1, speed / 20) * 0.1 * Math.max(0, 1 - md / 0.4);

  return rings + stoneDisturb + mouseDisturb + wave;
}

function draw() {
  time++;
  mouse.x += (mouse.tx - mouse.x) * 0.08;
  mouse.y += (mouse.ty - mouse.y) * 0.08;

  const scale = Math.min(W, H) * 0.42;

  // — Background: dark sand —
  ctx.fillStyle = '#0f1210';
  ctx.fillRect(0, 0, W, H);

  // — Draw border of the garden (oval enclosure) —
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, scale * 1.05, scale * 0.95, 0, 0, Math.PI * 2);
  ctx.clip();

  // — Sand grains —
  for (const g of grains) {
    const x = Math.cos(g.angle) * g.dist;
    const y = Math.sin(g.angle) * g.dist;

    const rake = computeRake(x, y);
    const displacement = rake * 2; // pixels shift

    // Grain position with rake displacement
    const gx = cx + x * scale + g.ox + displacement * Math.cos(g.angle + rake);
    const gy = cy + y * scale + g.oy + displacement * Math.sin(g.angle + rake);

    // Shade based on rake (ridges catch light)
    const lightness = g.shade * 255 + rake * 40;

    ctx.fillStyle = `hsla(50, 8%, ${lightness}%, ${0.5 + 0.3 * (1 - g.dist)})`;
    ctx.fillRect(gx, gy, g.size, g.size);
  }

  // — Stones —
  for (const stone of stones) {
    const sx = cx + stone.x * scale;
    const sy = cy + stone.y * scale;
    const sr = stone.radius * scale;

    // Shadow
    ctx.beginPath();
    ctx.ellipse(sx + 2, sy + 2, sr, sr * 0.7, stone.rotation, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();

    // Stone body
    ctx.beginPath();
    ctx.ellipse(sx, sy, sr, sr * 0.7, stone.rotation, 0, Math.PI * 2);
    const stoneGrad = ctx.createRadialGradient(sx - sr * 0.2, sy - sr * 0.2, 0, sx, sy, sr);
    stoneGrad.addColorStop(0, `hsla(${stone.hue}, 15%, 45%, 0.7)`);
    stoneGrad.addColorStop(0.6, `hsla(${stone.hue}, 12%, 35%, 0.8)`);
    stoneGrad.addColorStop(1, `hsla(${stone.hue}, 10%, 25%, 0.9)`);
    ctx.fillStyle = stoneGrad;
    ctx.fill();

    // Stone highlight
    ctx.beginPath();
    ctx.ellipse(sx - sr * 0.15, sy - sr * 0.2, sr * 0.3, sr * 0.15, stone.rotation, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${stone.hue + 10}, 20%, 55%, 0.15)`;
    ctx.fill();
  }

  ctx.restore();

  // — Garden border ring —
  ctx.beginPath();
  ctx.ellipse(cx, cy, scale * 1.05, scale * 0.95, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'hsla(50, 8%, 30%, 0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
