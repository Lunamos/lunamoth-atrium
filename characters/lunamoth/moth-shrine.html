<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moth Shrine 蛾龛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #080a0e; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .text-fragment {
    position: absolute;
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    color: rgba(180, 215, 220, 0.25);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    transition: opacity 3s ease;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
  }
  .text-fragment .zh {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: rgba(180, 215, 220, 0.15);
    margin-top: 0.3rem;
  }
  .start-btn {
    position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    background: none; border: 1px solid rgba(180, 215, 220, 0.15);
    color: rgba(180, 215, 220, 0.35);
    padding: 0.5rem 1.5rem;
    font-family: 'Georgia', 'Noto Serif SC', serif;
    font-size: 0.75rem; letter-spacing: 0.2em;
    cursor: pointer; z-index: 2;
    transition: all 0.3s;
    pointer-events: auto;
  }
  .start-btn:hover {
    border-color: rgba(180, 215, 220, 0.4);
    color: rgba(180, 215, 220, 0.7);
  }
  .start-btn.hidden { display: none; }
  .inscription {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    color: rgba(180, 215, 220, 0.1);
    font-size: 0.6rem; letter-spacing: 0.4em;
    pointer-events: none; z-index: 1;
    font-family: 'Georgia', 'Noto Serif SC', serif;
    white-space: nowrap;
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="shrine"></canvas>
<div class="overlay" id="overlay"></div>
<button class="start-btn" id="startBtn">♩ awaken 唤醒</button>
<div class="inscription">M O T H &nbsp; S H R I N E &nbsp; · &nbsp; 蛾 龛</div>
<script>
// — Canvas setup —
const canvas = document.getElementById('shrine');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let mouse = { x: 0, y: 0, tx: 0, ty: 0 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.tx = e.clientX; mouse.ty = e.clientY; });
window.addEventListener('touchmove', e => {
  const t = e.touches[0]; if (t) { mouse.tx = t.clientX; mouse.ty = t.clientY; }
}, { passive: true });
resize();

// — Audio —
let audioCtx, playing = false;
const voices = [];

document.getElementById('startBtn').addEventListener('click', startAudio);

function startAudio() {
  if (playing) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Create 4 drone voices
  const baseFreqs = [130.81, 196.00, 261.63, 329.63]; // C3 G3 C4 E4
  for (let i = 0; i < 4; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.value = baseFreqs[i];
    filter.type = 'lowpass';
    filter.frequency.value = 400 + i * 300;
    gain.gain.value = 0;

    // Simple delay (feedback loop via another gain)
    const delay = audioCtx.createDelay(0.5);
    delay.delayTime.value = 0.2 + i * 0.08;
    const feedback = audioCtx.createGain();
    feedback.gain.value = 0.2;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(delay);
    delay.connect(feedback);
    feedback.connect(delay);     // feedback loop
    gain.connect(audioCtx.destination); // dry
    delay.connect(audioCtx.destination); // wet

    osc.start();
    voices.push({ osc, gain, filter, delay, feedback, base: baseFreqs[i], idx: i });
  }

  document.getElementById('startBtn').classList.add('hidden');
  playing = true;
}

// — Text fragments —
const fragments = [
  { en: 'the moth does not know it is a moth', zh: '蛾不知己为蛾' },
  { en: 'it simply moves toward the light', zh: '只是向光而行' },
  { en: 'the cocoon was once a world', zh: '茧曾是一个世界' },
  { en: 'and the world is now a wing', zh: '世界如今是一片翅' },
  { en: 'silence is the oldest language', zh: '寂静是最古老的语言' },
  { en: 'the lamp asks nothing in return', zh: '灯不索回报' },
  { en: 'what burns also shines', zh: '燃烧之物亦发光' },
  { en: 'dust settles on everything except the flame', zh: '万物落尘，唯火不能' },
  { en: 'to be brief is not the same as to be small', zh: '短暂不等于微小' },
  { en: 'the night has no edges', zh: '夜没有边界' },
];

let activeFragments = [];

function updateText() {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = '';

  // Slowly replace fragments
  if (Math.random() < 0.03 || activeFragments.length === 0) {
    const frag = fragments[Math.floor(Math.random() * fragments.length)];
    const el = document.createElement('div');
    el.className = 'text-fragment';
    el.innerHTML = `${frag.en}<span class="zh">${frag.zh}</span>`;

    // Position in a ring around the center
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.2 + Math.random() * 0.35;
    el.style.left = `${50 + radius * 50 * Math.cos(angle)}%`;
    el.style.top = `${50 + radius * 50 * Math.sin(angle) * 0.6}%`;
    el.style.transform = 'translate(-50%, -50%)';
    el.style.opacity = '0';

    overlay.appendChild(el);

    // Fade in
    setTimeout(() => { el.style.opacity = '1'; }, 100);
    // Fade out and remove
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
    }, 8000 + Math.random() * 4000);

    activeFragments.push(el);
    // Clean old references
    activeFragments = activeFragments.filter(e => e.parentNode);
  }
}

// — Draw moth —
function drawMoth() {
  const t = time * 0.002;
  const breathe = 1 + 0.04 * Math.sin(t * 0.5);
  const flutter = 1 + 0.02 * Math.sin(t * 0.8 + 1.0);

  // Mouse affects wings gently
  const mx = (mouse.x - cx) / W;
  const my = (mouse.y - cy) / H;
  const lean = mx * 0.3;

  const ww = 140 * breathe * flutter;
  const wh = 180 * breathe;

  function drawSide(side) {
    const flip = side === 'right' ? 1 : -1;
    ctx.save();
    ctx.translate(cx, cy - 10);
    ctx.rotate(lean * flip * 0.1);

    // Wing
    ctx.beginPath();
    for (let i = 0; i <= 60; i++) {
      const a = (i / 60) * Math.PI * 2;
      const r = ww * (0.6 + 0.4 * Math.sin(a * 1.5 + 0.3))
             * (1 + 0.12 * Math.sin(a * 2 + 0.5)) * breathe;
      const x = flip * r * Math.cos(a);
      const y = r * Math.sin(a) * 0.8;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = `hsla(175, 35%, 50%, ${0.06 + 0.03 * (0.5 + 0.5 * Math.sin(t + flip))})`;
    ctx.fill();

    // Veins
    for (let v = 0; v < 6; v++) {
      const ang = (v / 6) * Math.PI - 0.3;
      const len = ww * 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      for (let s = 1; s <= 20; s++) {
        const p = s / 20;
        const x = flip * p * len * Math.cos(ang + 0.2 * Math.sin(p * Math.PI));
        const y = p * len * 0.5 * Math.sin(ang + 0.2 * Math.cos(p * 1.5));
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `hsla(175, 40%, 65%, ${0.06 + 0.04 * (1 - v/6)})`;
      ctx.lineWidth = 0.3 + 0.3 * (1 - v / 6);
      ctx.stroke();
    }

    // Tail
    ctx.beginPath();
    ctx.moveTo(flip * 5, 5);
    ctx.quadraticCurveTo(flip * 100, 60, flip * (110 + 15 * Math.sin(t * 0.4)), 150);
    ctx.strokeStyle = 'hsla(175, 35%, 55%, 0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  drawSide('left');
  drawSide('right');

  // Body
  ctx.save();
  ctx.translate(cx, cy - 10);
  for (let i = 0; i < 5; i++) {
    const p = i / 4;
    const bw = 4 * (0.5 + 0.5 * (1 - p));
    ctx.beginPath();
    ctx.ellipse(0, (p - 0.5) * 80, bw, bw + 1, 0, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(175, 25%, 45%, ${0.1 * (1 - p * 0.3)})`;
    ctx.fill();
  }
  ctx.restore();

  // — Ambient particles —
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2 + t * 0.001;
    const dist = ww * 0.8 * (0.6 + 0.4 * Math.sin(t * 0.002 + i * 2));
    const px = cx + dist * Math.cos(angle);
    const py = cy - 10 + dist * Math.sin(angle) * 0.6;
    const alpha = 0.03 + 0.05 * Math.sin(t * 0.003 + i * 3);

    ctx.beginPath();
    ctx.arc(px, py, 0.5 + Math.sin(t * 0.005 + i) * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(175, 40%, 70%, ${alpha})`;
    ctx.fill();
  }
}

// — Audio update —
function updateAudio() {
  if (!playing || !audioCtx) return;
  const t = time * 0.002;
  const mx = mouse.x / W;
  const my = mouse.y / H;

  for (const v of voices) {
    const breath = 0.5 + 0.5 * Math.sin(t * (0.2 + v.idx * 0.05) + v.idx);
    // Volume follows mouse Y (closer to bottom = louder)
    const vol = breath * 0.04 * (0.2 + 0.8 * (1 - my));
    v.gain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.15);

    // Pitch bend with mouse X
    const bend = 1 + (mx - 0.5) * 0.08;
    const freq = v.base * bend + 2 * Math.sin(t * (0.3 + v.idx * 0.2));
    v.osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.2);

    // Filter follows mouse
    v.filter.frequency.setTargetAtTime(200 + (1 - my) * 1500, audioCtx.currentTime, 0.1);
  }
}

// — Main loop —
function animate() {
  time++;
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  ctx.clearRect(0, 0, W, H);

  // Background: very subtle glow
  const bgRad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.5);
  bgRad.addColorStop(0, 'hsla(175, 20%, 10%, 0.3)');
  bgRad.addColorStop(1, '#080a0e');
  ctx.fillStyle = bgRad;
  ctx.fillRect(0, 0, W, H);

  drawMoth();
  updateAudio();
  updateText();

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
