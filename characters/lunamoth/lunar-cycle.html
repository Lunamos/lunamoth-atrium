<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Cycle 月相</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06080e; }
  canvas { display: block; }
  .inscription {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(180, 215, 220, 0.18);
    font-size: 0.8rem; letter-spacing: 0.3em;
    pointer-events: none; text-align: center;
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    line-height: 1.6;
  }
  .inscription .zh {
    display: block;
    font-size: 0.65rem; letter-spacing: 0.5em;
    color: rgba(180, 215, 220, 0.12);
  }
</style>
</head>
<body>
<a href="index.html" aria-label="back to gallery / 返回画廊" style="position:fixed;top:1.4rem;left:1.4rem;z-index:50;font-family:'Georgia','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.12em;color:rgba(180,215,220,0.4);text-decoration:none;border:1px solid rgba(180,215,220,0.15);border-radius:2px;padding:0.35rem 0.8rem;background:rgba(10,12,18,0.55);backdrop-filter:blur(4px);transition:color 0.3s,border-color 0.3s;" onmouseover="this.style.color='rgba(180,215,220,0.9)';this.style.borderColor='rgba(180,215,220,0.4)';" onmouseout="this.style.color='rgba(180,215,220,0.4)';this.style.borderColor='rgba(180,215,220,0.15)';">← back 返回</a>
<canvas id="lunar"></canvas>
<div class="inscription">L U N A R &nbsp; C Y C L E &nbsp; · &nbsp; 月 相<span class="zh">每三分钟一轮 · 鼠标移动改变相位</span></div>
<script>
const canvas = document.getElementById('lunar');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let mouse = { x: 0, y: 0, tx: 0, ty: 0 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.tx = e.clientX; mouse.ty = e.clientY; });
window.addEventListener('touchmove', e => {
  const t = e.touches[0]; if (t) { mouse.tx = t.clientX; mouse.ty = t.clientY; }
}, { passive: true });
resize();

// — Craters (procedural, generated once) —
const craters = [];
for (let i = 0; i < 80; i++) {
  // Random position on moon disc (reject outside)
  let x, y, d;
  do {
    x = (Math.random() - 0.5) * 2;
    y = (Math.random() - 0.5) * 2;
    d = Math.sqrt(x * x + y * y);
  } while (d > 0.92);

  craters.push({
    x, y,
    radius: 0.02 + Math.random() * 0.12,
    depth: 0.1 + Math.random() * 0.6,  // 0=shallow, 1=deep
    alpha: 0.05 + Math.random() * 0.2,
    phase: Math.random() * Math.PI * 2,
  });
}

// — Star field —
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    size: 0.3 + Math.random() * 1.5,
    twinkle: 0.3 + Math.random() * 0.7,
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.8,
  });
}

function draw() {
  time++;
  mouse.x += (mouse.tx - mouse.x) * 0.03;
  mouse.y += (mouse.ty - mouse.y) * 0.03;

  // Phase: 0 = new moon, 0.5 = full, 1 = new again
  // Mouse X overrides, otherwise cycle automatically
  const autoPhase = (time * 0.00015) % 1;  // ~3 min per cycle
  const phase = 0.2 + 0.6 * (mouse.x / W) + 0.2 * autoPhase;
  const p = ((phase % 1) + 1) % 1;

  ctx.clearRect(0, 0, W, H);

  // — Background: deep space —
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.8);
  bgGrad.addColorStop(0, '#0a1218');
  bgGrad.addColorStop(0.6, '#080a10');
  bgGrad.addColorStop(1, '#04060a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // — Stars —
  for (const star of stars) {
    const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * 0.005 * star.speed + star.phase));
    const sx = star.x * W;
    const sy = star.y * H;
    const alpha = twinkle * 0.4;

    ctx.beginPath();
    ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(200, 20%, 80%, ${alpha})`;
    ctx.fill();
  }

  // — Moon glow —
  const moonRadius = Math.min(W, H) * 0.28;
  const glowRadius = moonRadius * 2.2;

  const glow = ctx.createRadialGradient(cx, cy, moonRadius * 0.5, cx, cy, glowRadius);
  glow.addColorStop(0, `hsla(195, 30%, 70%, ${0.04 + 0.06 * (0.5 + 0.5 * Math.sin(p * Math.PI))})`);
  glow.addColorStop(0.5, `hsla(195, 30%, 60%, 0.02)`);
  glow.addColorStop(1, 'hsla(195, 30%, 50%, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // — Moon disc —
  // Illuminated portion
  const illumination = p;

  // Moon surface base
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, moonRadius, 0, Math.PI * 2);
  ctx.clip();

  // Lunar surface gradient
  const surface = ctx.createRadialGradient(cx - moonRadius * 0.2, cy - moonRadius * 0.2, 0, cx, cy, moonRadius);
  surface.addColorStop(0, `hsla(195, 15%, 35%, ${0.3 + 0.2 * illumination})`);
  surface.addColorStop(0.5, `hsla(200, 12%, 28%, ${0.25 + 0.15 * illumination})`);
  surface.addColorStop(1, `hsla(210, 10%, 18%, ${0.2 + 0.1 * illumination})`);
  ctx.fillStyle = surface;
  ctx.fillRect(cx - moonRadius, cy - moonRadius, moonRadius * 2, moonRadius * 2);

  // Craters
  for (const cr of craters) {
    const cx2 = cx + cr.x * moonRadius;
    const cy2 = cy + cr.y * moonRadius;
    const r = cr.radius * moonRadius;

    // Crater shadow/highlight based on phase
    const craterIllum = 0.5 + 0.5 * Math.cos(Math.atan2(cr.y, cr.x) + p * Math.PI * 2);
    const shadow = 0.3 + 0.7 * (1 - craterIllum) * cr.depth;
    const highlight = craterIllum * cr.depth * 0.3;

    ctx.beginPath();
    ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(210, 10%, ${15 + shadow * 20}%, ${cr.alpha})`;
    ctx.fill();

    // Highlight edge
    ctx.beginPath();
    ctx.arc(cx2 - r * 0.15, cy2 - r * 0.15, r * 0.85, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(195, 20%, 50%, ${highlight * cr.alpha})`;
    ctx.fill();
  }

  // Phase shadow (the night side)
  ctx.beginPath();
  // Draw the dark side of the moon
  const shadowX = cx - moonRadius * (2 * p - 1);
  ctx.ellipse(shadowX, cy, moonRadius * Math.abs(1 - 2 * Math.abs(p - 0.5) * 2), moonRadius * 1.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#06080e';
  ctx.fill();

  ctx.restore();

  // Moon outline
  ctx.beginPath();
  ctx.arc(cx, cy, moonRadius, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(195, 20%, 50%, ${0.06 + 0.04 * illumination})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
