<div class="specimen-notes">
单株花穗，采自峭壁顶部靠海一侧——紫色深到几乎发黑，我从未见过这个色度。留了其余植株让其结籽。压于地图册下三日。花冠在压制中失水收缩，但形状保持完整。东边村落有一种用黑汁配伍的不同制法——待核实。
</div>
